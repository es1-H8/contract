        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies (and legacy libs for imports)
        run: |
          npm install
          # Force legacy OZ versions for contracts using Ownable(msg.sender)
          npm install openzeppelin-solidity@2.5.1 zeppelin-solidity@1.12.0 --no-save
          # Modern OZ + other dependencies
          npm install @openzeppelin/contracts@4.9.6 @openzeppelin/contracts-upgradeable@4.9.6 @chainlink/contracts --no-save

      - name: Ensure remappings.txt (only if missing)
        run: |
          if [ ! -f remappings.txt ]; then
            echo "@openzeppelin/=node_modules/@openzeppelin/" > remappings.txt
            echo "@chainlink/=node_modules/@chainlink/" >> remappings.txt
            echo "@pythnetwork/=node_modules/@pythnetwork/" >> remappings.txt
            echo "erc721a/=node_modules/erc721a/" >> remappings.txt
            echo "@uniswap/=node_modules/@uniswap/" >> remappings.txt
            echo "zeppelin-solidity/=node_modules/zeppelin-solidity/" >> remappings.txt
            echo "openzeppelin-solidity/=node_modules/openzeppelin-solidity/" >> remappings.txt
          fi
          echo "=== REMAPPINGS IN USE ==="
          cat remappings.txt || true

      - name: Verify dependencies for import resolution
        run: |
          echo "=== VERIFYING DEPENDENCIES FOR IMPORT RESOLUTION ==="
          echo "OpenZeppelin contracts:"
          ls -la node_modules/@openzeppelin/contracts/ | head -5 || true
          echo ""
          echo "OpenZeppelin (upgradeable):"
          ls -la node_modules/@openzeppelin/contracts-upgradeable/ | head -5 || true
          echo ""
          echo "Chainlink contracts:"
          ls -la node_modules/@chainlink/contracts/ | head -5 || true
          echo ""
          echo "Pyth Network:"
          ls -la node_modules/@pythnetwork/ | head -5 || true
          echo ""
          echo "ERC721A:"
          ls -la node_modules/erc721a/ | head -5 || true
          echo ""
          echo "Legacy zeppelin-solidity:"
          ls -la node_modules/zeppelin-solidity/ | head -5 || true
          echo ""
          echo "Legacy openzeppelin-solidity:"
          ls -la node_modules/openzeppelin-solidity/ | head -5 || true
          echo ""
          # Extra: prove the exact upgradeable paths Mythril/Echidna need really exist
          test -f node_modules/@openzeppelin/contracts-upgradeable/access/OwnableUpgradeable.sol && echo "OwnableUpgradeable ✅" || echo "OwnableUpgradeable ❌"
          test -f node_modules/@openzeppelin/contracts/utils/cryptography/ECDSA.sol && echo "ECDSA ✅" || echo "ECDSA ❌"
          echo "Dependencies verification complete"

