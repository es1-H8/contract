      #     {
      #       echo "@openzeppelin/=node_modules/@openzeppelin/"
      #       echo "@chainlink/=node_modules/@chainlink/"
      #       echo "@pythnetwork/=node_modules/@pythnetwork/"
      #       echo "erc721a/=node_modules/erc721a/"
      #       echo "@uniswap/=node_modules/@uniswap/"
      #       echo "zeppelin-solidity/=node_modules/zeppelin-solidity/"
      #       echo "openzeppelin-solidity/=node_modules/openzeppelin-solidity/"
      #     } > remappings.txt
      #     echo "Remappings created:"; cat remappings.txt; echo ""
      #     slither . --solc-args="--base-path . --include-path node_modules --allow-paths .,node_modules" 2>&1 | tee raw-slither.txt || echo "Slither completed with findings" | tee -a raw-slither.txt
