      # ==============================
      # Echidna (simple, 0.8.x only + skip list)
      # ==============================
      - name: Run Echidna analysis
        env:
          ECHIDNA_SKIP: contracts/Ai.sol,contracts/DecentralizedInsurance.sol,contracts/agent.sol
        run: |
          echo "=== ECHIDNA SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Echidna (trailofbits/echidna)" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo "" | tee -a security-report.txt

          if [ ! -f echidna.yaml ]; then
            echo "testLimit: 100" > echidna.yaml
          fi

          docker pull trailofbits/echidna:latest

          # turn comma list into newline list for exact matching
          SKIP_LIST="$(echo "${ECHIDNA_SKIP:-}" | tr ',' '\n' | xargs -I{} echo "{}")"

          for contract in contracts/*.sol; do
            [ -f "$contract" ] || continue
            file="$(basename "$contract")"
            pragma=$(grep -m1 -E "pragma\s+solidity" "$contract" || true)

            # Only run Echidna on 0.8.x files
            if ! echo "$pragma" | grep -qE "0\.8"; then
              echo "========================================" | tee -a security-report.txt
              echo "Fuzz Testing: $file (skipped: Echidna run limited to 0.8.x)" | tee -a security-report.txt
              echo "========================================" | tee -a security-report.txt
              echo "" | tee -a security-report.txt
              continue
            fi

            # Explicit skip list
            if echo "$SKIP_LIST" | grep -qx "contracts/$file"; then
              echo "========================================" | tee -a security-report.txt
              echo "Fuzz Testing: $file (skipped by ECHIDNA_SKIP)" | tee -a security-report.txt
              echo "========================================" | tee -a security-report.txt
              echo "" | tee -a security-report.txt
              continue
            fi

            echo "========================================" | tee -a security-report.txt
            echo "Fuzz Testing: $file" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            docker run --rm \
              -v "$PWD":/src \
              -w /src \
              trailofbits/echidna:latest \
              echidna-test "contracts/$file" \
                --test-mode assertion \
                --config echidna.yaml \
                --solc-args "--base-path $PWD --include-path $PWD/node_modules --allow-paths $PWD,$PWD/node_modules" \
              2>&1 | tee -a security-report.txt || true

            echo "" | tee -a security-report.txt
          done

      # ==============================
      # Mythril (skip ONLY 0.4.x; version-aware flags; absolute paths)
      # ==============================
      - name: Install Mythril + solc-select
        run: |
          python3 -m pip install --upgrade pip
          pip install mythril solc-select

      - name: Run Mythril analysis
        run: |
          echo "=== MYTHRIL SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Mythril" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo "" | tee -a security-report.txt

          pick_version() {
            raw="$1"
            v="${raw//^/}"; v="${v//>=/}"; v="${v//~=/}"; v="${v// /}"
            case "$v" in
              0.4.*) echo "0.4.26" ;;
              0.5.*) echo "0.5.17" ;;
              0.6.*) echo "0.6.12" ;;
              0.7.*) echo "0.7.6" ;;
              0.8.30|0.8.29|0.8.28|0.8.27|0.8.26|0.8.25|0.8.24|0.8.23|0.8.22|0.8.21|0.8.20) echo "$v" ;;
              0.8.*) echo "0.8.26" ;;
              *) echo "0.8.20" ;;
            esac
          }

          # Pre-install common solc versions
          for v in 0.4.26 0.5.17 0.6.12 0.7.6 0.8.20 0.8.26 0.8.30; do
            solc-select versions | grep -q " $v " || solc-select install "$v" || true
          done

          for contract in contracts/*.sol; do
            [ -f "$contract" ] || continue
            name=$(basename "$contract")
            pragma=$(grep -m1 -E "pragma\s+solidity" "$contract" || true)
            token=$(echo "$pragma" | sed -E 's/.*solidity([^;]*);/\1/' | awk '{print $1}' | tr -d ' ')
            solv=$(pick_version "$token")

            # Skip ONLY 0.4.x, with your exact message
            if echo "$solv" | grep -q "^0\.4"; then
              echo "========================================" | tee -a security-report.txt
              echo "Analyzing: $name (skipped: Can't compile and I use Mythril on old contracts.)" | tee -a security-report.txt
              echo "========================================" | tee -a security-report.txt
              echo "" | tee -a security-report.txt
              continue
            fi

            abs_file="$PWD/contracts/$name"

            echo "========================================" | tee -a security-report.txt
            echo "Analyzing: $name (solc $solv)" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            if echo "$solv" | grep -Eq "^0\.5\."; then
              # 0.5.x: do NOT use -I; allow-paths only
              myth analyze "$abs_file" \
                --solv "$solv" \
                --solc-args "--allow-paths $PWD,$PWD/node_modules" \
                --execution-timeout 120 \
                --max-depth 16 \
                --create-timeout 60 \
                --solver-timeout 10000 \
                2>&1 | tee -a security-report.txt || true
            elif echo "$solv" | grep -Eq "^0\.(6|7|8)\."; then
              # 0.6+ supports base/include
              myth analyze "$abs_file" \
                --solv "$solv" \
                --solc-args "--base-path $PWD --include-path $PWD/node_modules --allow-paths $PWD,$PWD/node_modules" \
                --execution-timeout 120 \
                --max-depth 16 \
                --create-timeout 60 \
                --solver-timeout 10000 \
                2>&1 | tee -a security-report.txt || true
            else
              # Fallback
              myth analyze "$abs_file" \
                --solv "$solv" \
                --solc-args "--allow-paths $PWD,$PWD/node_modules" \
                --execution-timeout 120 \
                --max-depth 16 \
                --create-timeout 60 \
                --solver-timeout 10000 \
                2>&1 | tee -a security-report.txt || true
            fi

            echo "" | tee -a security-report.txt
          done

      - name: Upload full security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: [ build, security ]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Discover contracts for deployment
        run: |
          echo "=== CONTRACTS DISCOVERED FOR DEPLOYMENT ==="
          ls -la contracts/
          echo ""
          ls contracts/*.sol | sed 's/contracts\//  - /'
          echo ""
          echo "Total contracts to deploy: $(ls contracts/*.sol | wc -l)"

      - name: Deploy to Sepolia Testnet
        env:
          INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: npx hardhat run scripts/deploy-all.js --network sepolia

      - name: Display deployment summary
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          if [ -f deployment-summary.txt ]; then
            cat deployment-summary.txt
          else
            echo "No deployment summary found"
          fi

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.txt
