      # ==============================
      # Echidna (run for 0.4.x–0.8.x; clean error handling)
      # ==============================
      - name: Run Echidna analysis
        run: |
          echo "=== ECHIDNA SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Echidna (trailofbits/echidna)" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo "" | tee -a security-report.txt

          if [ ! -f echidna.yaml ]; then
            echo "testLimit: 100" > echidna.yaml
          fi

          docker pull trailofbits/echidna:latest

          for contract in contracts/*.sol; do
            [ -f "$contract" ] || continue
            file="$(basename "$contract")"
            echo "========================================" | tee -a security-report.txt
            echo "Fuzz Testing: $file" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            set +e
            OUT=$(docker run --rm \
              -v "$PWD":/src \
              -w /src \
              trailofbits/echidna:latest \
              echidna-test "contracts/$file" \
                --test-mode assertion \
                --config echidna.yaml \
                --solc-args "--base-path /src --include-path /src/node_modules --allow-paths /src,/src/node_modules" \
              2>&1)
            RC=$?
            set -e

            if [ $RC -ne 0 ]; then
              if echo "$OUT" | grep -qi "requires different compiler version"; then
                echo "Result: Skipped due to compiler error" | tee -a security-report.txt
              elif echo "$OUT" | grep -qi "Constructor arguments are required"; then
                echo "Result: Skipped due to constructor error" | tee -a security-report.txt
              else
                echo "Result: Skipped due to unknown error" | tee -a security-report.txt
              fi
            else
              echo "$OUT" | tee -a security-report.txt
            fi

            echo "" | tee -a security-report.txt
          done

      # ==============================
      # Mythril (analyze all versions, with legacy-solc fallback & clean errors)
      # ==============================
      - name: Install Mythril + solc-select
        run: |
          python3 -m pip install --upgrade pip
          pip install mythril solc-select

      - name: Run Mythril analysis
        run: |
          set -e
          echo "=== MYTHRIL SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Mythril" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo ""

          cd "$GITHUB_WORKSPACE"
          ABS="$(pwd)"
          echo "cwd: $ABS"
          echo "contracts present:"; ls -la "$ABS/contracts" || true
          echo ""

          pick_version() {
            raw="$1"
            v="${raw//^/}"; v="${v//>=/}"; v="${v//~=/}"; v="${v// /}"
            case "$v" in
              0.4.*) echo "0.4.26" ;;
              0.5.*) echo "0.5.17" ;;
              0.6.*) echo "0.6.12" ;;
              0.7.*) echo "0.7.6"  ;;
              0.8.30|0.8.29|0.8.28|0.8.27|0.8.26|0.8.25|0.8.24|0.8.23|0.8.22|0.8.21|0.8.20) echo "$v" ;;
              0.8.*) echo "0.8.26" ;;
              *) echo "0.8.20" ;;
            esac
          }

          # Pre-install common solc versions
          for v in 0.4.26 0.5.17 0.6.12 0.7.6 0.8.20 0.8.26 0.8.30; do
            solc-select versions | grep -q " $v " || solc-select install "$v" || true
          done

          for contract in contracts/*.sol; do
            [ -f "$contract" ] || continue
            name=$(basename "$contract")
            pragma=$(grep -m1 -E "pragma\s+solidity" "$contract" || true)
            token=$(echo "$pragma" | sed -E 's/.*solidity([^;]*);/\1/' | awk '{print $1}' | tr -d ' ')
            solv=$(pick_version "$token")

            echo "========================================" | tee -a security-report.txt
            echo "Analyzing: $name (solc $solv)" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            # Decide solc args by version (legacy solc doesn't support --base-path/--include-path)
            if echo "$solv" | grep -Eq "^0\.(4|5)\."; then
              SOLC_ARGS="--allow-paths $ABS,$ABS/node_modules"
            else
              SOLC_ARGS="--base-path $ABS --include-path $ABS/node_modules --allow-paths $ABS,$ABS/node_modules"
            fi

            set +e
            OUT=$(myth analyze "contracts/$name" \
              --solv "$solv" \
              --solc-args "$SOLC_ARGS" \
              --execution-timeout 120 \
              --max-depth 16 \
              --create-timeout 60 \
              --solver-timeout 10000 2>&1)
            RC=$?
            set -e

            # If legacy solc choked on modern flags, retry with legacy-safe args
            if [ $RC -ne 0 ] && echo "$OUT" | grep -qi "unrecognised option '--base-path'"; then
              set +e
              OUT=$(myth analyze "contracts/$name" \
                --solv "$solv" \
                --solc-args "--allow-paths $ABS,$ABS/node_modules" \
                --execution-timeout 120 \
                --max-depth 16 \
                --create-timeout 60 \
                --solver-timeout 10000 2>&1)
              RC=$?
              set -e
            fi

            if [ $RC -ne 0 ]; then
              if echo "$OUT" | grep -qi "requires different compiler version"; then
                echo "Result: Skipped due to compiler error" | tee -a security-report.txt
              elif echo "$OUT" | grep -qi "Constructor arguments are required"; then
                echo "Result: Skipped due to constructor error" | tee -a security-report.txt
              elif echo "$OUT" | grep -qi "Input file not found"; then
                echo "Result: Skipped due to missing imports" | tee -a security-report.txt
              else
                echo "Result: Skipped due to unknown error" | tee -a security-report.txt
              fi
            else
              echo "$OUT" | tee -a security-report.txt
            fi

            echo "" | tee -a security-report.txt
          done

      - name: Upload full security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Discover contracts for deployment
        run: |
          echo "=== CONTRACTS DISCOVERED FOR DEPLOYMENT==="
          ls -la contracts/
          echo ""
          ls contracts/*.sol | sed 's/contracts\//  - /'
          echo ""
          echo "Total contracts to deploy: $(ls contracts/*.sol | wc -l)"

      - name: Deploy to Sepolia Testnet
        env:
          INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: npx hardhat run scripts/deploy-all.js --network sepolia

      - name: Display deployment summary
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          if [ -f deployment-summary.txt ]; then
            cat deployment-summary.txt
          else
            echo "No deployment summary found"
          fi

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.txt
