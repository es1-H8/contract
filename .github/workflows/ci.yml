name: Smart Contract CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Hardhat clean (avoid stale build-info)
        run: npx hardhat clean

      - name: Compile contracts
        run: |
          echo "=== HARDHAT COMPILE ==="
          npx hardhat compile

      - name: Run Hardhat Tests
        run: npx hardhat test

  security:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install NPM dependencies (incl. import-heavy tool deps)
        run: |
          npm install
          # Ensure packages used by imports are present for Mythril/Echidna resolution
          npm i -D @openzeppelin/contracts @openzeppelin/contracts-upgradeable @chainlink/contracts @pythnetwork/pyth-sdk-solidity @uniswap/v2-core @uniswap/v2-periphery erc721a || true

      - name: Verify dependencies for import resolution
        run: |
          echo "=== VERIFYING DEPENDENCIES FOR IMPORT RESOLUTION ==="
          for p in \
            node_modules/@openzeppelin/contracts \
            node_modules/@openzeppelin/contracts-upgradeable \
            node_modules/@chainlink/contracts \
            node_modules/@pythnetwork \
            node_modules/erc721a \
            node_modules/@uniswap \
          ; do
            echo ""
            echo "Checking $p"
            ls -la "$p" | head -20 || true
          done
          echo ""
          echo "Dependencies verification complete"

      # -------------------------
      # SOLHINT (COMMENTED OUT)
