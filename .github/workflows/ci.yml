name: Smart Contract CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Hardhat clean (avoid stale build-info)
        run: npx hardhat clean

      - name: Compile contracts
        run: |
          echo "=== HARDHAT COMPILE ==="
          npx hardhat compile

      - name: Run Hardhat Tests
        run: npx hardhat test

  security:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install NPM dependencies (include security deps for imports)
        run: |
          npm install
          # Ensure imports are present for Mythril/Echidna compilation
          npm i -D @openzeppelin/contracts @openzeppelin/contracts-upgradeable @chainlink/contracts @pythnetwork/pyth-sdk-solidity @uniswap/v2-core @uniswap/v2-periphery erc721a || true

      - name: Verify dependencies for import resolution
        run: |
          echo "=== VERIFYING DEPENDENCIES FOR IMPORT RESOLUTION ==="
          for p in \
            node_modules/@openzeppelin/contracts \
            node_modules/@openzeppelin/contracts-upgradeable \
            node_modules/@chainlink/contracts \
            node_modules/@pythnetwork \
            node_modules/erc721a \
            node_modules/@uniswap \
          ; do
            echo ""; echo "Checking $p"
            ls -la "$p" | head -20 || true
          done
          echo ""; echo "Dependencies verification complete"

      # -------------------------
      # SOLHINT (COMMENTED OUT)
      # -------------------------
      # - name: Install Solhint
      #   run: npm install -g solhint
      #
      # - name: Run Solhint linting
      #   run: |
      #     echo "=== SOLHINT SECURITY ANALYSIS ===" | tee security-report.txt
      #     echo "Tool: Solhint" | tee -a security-report.txt
      #     echo "Timestamp: $(date)" | tee -a security-report.txt
      #     echo "" | tee -a security-report.txt
      #     shopt -s nullglob
      #     for contract in contracts/*.sol; do
      #       name=$(basename "$contract")
      #       echo "========================================" | tee -a security-report.txt
      #       echo "Analyzing: $name" | tee -a security-report.txt
      #       echo "========================================" | tee -a security-report.txt
      #       npx solhint "$contract" --formatter=unix | tee -a security-report.txt || true
      #     done

      # -------------------------
      # SLITHER (COMMENTED OUT)
      # -------------------------
      # - name: Install Slither
      #   run: |
      #     python3 -m pip install --upgrade pip
      #     pip install slither-analyzer
      # - name: Run Slither analysis
      #   run: |
      #     echo "@openzeppelin/=node_modules/@openzeppelin/" > remappings.txt
      #     echo "@chainlink/=node_modules/@chainlink/" >> remappings.txt
      #     echo "@pythnetwork/=node_modules/@pythnetwork/" >> remappings.txt
      #     echo "erc721a/=node_modules/erc721a/" >> remappings.txt
      #     echo "@uniswap/=node_modules/@uniswap/" >> remappings.txt
      #     slither . --solc-args="--base-path . --include-path node_modules --allow-paths .,node_modules" || true

      # ==============================
      # Install Echidna & Mythril natively + solc-select
      # ==============================
      - name: Install echidna, mythril, solc-select
        run: |
          python3 -m pip install --upgrade pip
          pip install echidna mythril solc-select crytic-compile

      - name: Pre-install common solc versions
        shell: bash
        run: |
          set -e
          # Always have a baseline across 0.4–0.8
          BASELINE=(0.4.26 0.5.17 0.6.12 0.7.6 0.8.20 0.8.26 0.8.30)
          for v in "${BASELINE[@]}"; do
            solc-select versions | grep -q " $v " || solc-select install "$v" || true
          done

          # Parse exact versions from pragmas; install if exact pins are found
          shopt -s nullglob
          REQS=()
          for f in contracts/*.sol; do
            p=$(grep -m1 -E "pragma\s+solidity" "$f" || true)
            # Extract tokens like "0.8.26" or "^0.8.20" or ">=0.6.0"
            t=$(echo "$p" | sed -E 's/.*solidity([^;]*);/\1/' | tr -d ' ')
            # If exact x.y.z specified (no ^ or >), capture and queue
            if echo "$t" | grep -Eq '(^|[^0-9])([0-9]+\.[0-9]+\.[0-9]+)($|[^0-9])' ; then
              exact=$(echo "$t" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              REQS+=("$exact")
            fi
          done
          # unique install
          printf "%s\n" "${REQS[@]}" | sort -u | while read -r v; do
            [ -z "$v" ] && continue
            solc-select versions | grep -q " $v " || solc-select install "$v" || true
          done

      # ==============================
      # Echidna now with per-contract solc-select and working imports
      # ==============================
      - name: Run Echidna analysis (per-contract, 0.8.x only)
        shell: bash
        run: |
          echo "=== ECHIDNA SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Echidna (native pip)" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo "" | tee -a security-report.txt

          # Small default budget if no project config exists
          [ -f echidna.yaml ] || printf "testLimit: 100\nseqLen: 50\n" > echidna.yaml

          pick_version() {
            raw="$1"
            tok="${raw//^/}"; tok="${tok//>=/}"; tok="${tok//~=/}"
            tok=$(echo "$tok" | tr -d ' ')
            # Exact x.y.z: use exact
            if echo "$tok" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "$tok"; return
            fi
            # Broad ranges: choose a stable/latest for that minor
            case "$tok" in
              0.8.*|0.8|>=0.8.0) echo "0.8.30" ;;
              0.7.*|0.7|>=0.7.0) echo "0.7.6" ;;
              0.6.*|0.6|>=0.6.0) echo "0.6.12" ;;
              0.5.*|0.5|>=0.5.0) echo "0.5.17" ;;
              0.4.*|0.4|>=0.4.0) echo "0.4.26" ;;
              *) echo "0.8.26" ;;
            esac
          }

          shopt -s nullglob
          for file in contracts/*.sol; do
            pragma=$(grep -m1 -E "pragma\s+solidity" "$file" || true)

            # Echidna fuzzing still limited to 0.8.x (we keep this guard)
            if ! echo "$pragma" | grep -qE "0\.8"; then
              echo "========================================" | tee -a security-report.txt
              echo "Fuzz Testing: $(basename "$file") (skipped: Echidna run limited to 0.8.x)" | tee -a security-report.txt
              echo "========================================" | tee -a security-report.txt
              echo "" | tee -a security-report.txt
              continue
            fi

            token=$(echo "$pragma" | sed -E 's/.*solidity([^;]*);/\1/' | awk '{print $1}')
            solv=$(pick_version "$token")
            solc-select use "$solv" >/dev/null 2>&1 || true

            echo "========================================" | tee -a security-report.txt
            echo "Fuzz Testing: $(basename "$file") [solc $solv]" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            # Important: give Crytic (Echidna) full include paths so OZ/Chainlink resolve
            # NOTE: contracts with required constructor args still need a harness or config.
            set +e
            echidna-test "$file" \
              --test-mode assertion \
              --config echidna.yaml \
              --solc-args "--base-path . --include-path node_modules --allow-paths .,node_modules" \
              2>&1 | tee -a security-report.txt
            set -e

            echo "" | tee -a security-report.txt
          done

      # ==============================
      # Mythril (supports 0.4–0.8 with per-contract solc-select)
      # ==============================
      - name: Run Mythril analysis
        shell: bash
        run: |
          set -e
          echo "=== MYTHRIL SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Mythril" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo ""

          ABS="$(pwd)"
          echo "cwd: $ABS"
          echo "contracts present:"; ls -la "$ABS/contracts" || true
          echo ""

          pick_version() {
            raw="$1"
            tok="${raw//^/}"; tok="${tok//>=/}"; tok="${tok//~=/}"
            tok=$(echo "$tok" | tr -d ' ')
            if echo "$tok" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "$tok"; return
            fi
            case "$tok" in
              0.8.*|0.8|>=0.8.0) echo "0.8.30" ;;
              0.7.*|0.7|>=0.7.0) echo "0.7.6" ;;
              0.6.*|0.6|>=0.6.0) echo "0.6.12" ;;
              0.5.*|0.5|>=0.5.0) echo "0.5.17" ;;
              0.4.*|0.4|>=0.4.0) echo "0.4.26" ;;
              *) echo "0.8.26" ;;
            esac
          }

          shopt -s nullglob
          for contract in contracts/*.sol; do
            name=$(basename "$contract")
            pragma=$(grep -m1 -E "pragma\s+solidity" "$contract" || true)
            token=$(echo "$pragma" | sed -E 's/.*solidity([^;]*);/\1/' | awk '{print $1}')
            solv=$(pick_version "$token")

            solc-select use "$solv" >/dev/null 2>&1 || true

            echo "========================================" | tee -a security-report.txt
            echo "Analyzing: $name (solc $solv)" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            # Always pass include paths so OZ/Chainlink/etc resolve
            myth analyze "contracts/$name" \
              --solv "$solv" \
              --solc-args "--base-path $ABS --include-path $ABS/node_modules --allow-paths $ABS,$ABS/node_modules" \
              --execution-timeout 120 \
              --max-depth 16 \
              --create-timeout 60 \
              --solver-timeout 10000 \
              2>&1 | tee -a security-report.txt || true

            echo "" | tee -a security-report.txt
          done

      - name: Upload full security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Discover contracts for deployment
        run: |
          echo "=== CONTRACTS DISCOVERED FOR DEPLOYMENT ==="
          ls -la contracts/ || true
          echo ""
          ls contracts/*.sol 2>/dev/null | sed 's#contracts/#  - #'
          echo ""
          echo "Total contracts to deploy: $(ls contracts/*.sol 2>/dev/null | wc -l | xargs)"

      - name: Deploy to Sepolia Testnet
        env:
          INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: npx hardhat run scripts/deploy-all.js --network sepolia

      - name: Display deployment summary
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          if [ -f deployment-summary.txt ]; then
            cat deployment-summary.txt
          else
            echo "No deployment summary found"
          fi

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.txt
