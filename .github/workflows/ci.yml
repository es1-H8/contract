      # ------------------------------
      # Echidna (assert-mode; skip 0.4.x)
      # ------------------------------
      - name: Run Echidna analysis
        run: |
          echo "=== ECHIDNA SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Echidna (trailofbits/echidna)" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo "" | tee -a security-report.txt

          if [ ! -f echidna.yaml ]; then
            echo "testLimit: 100" > echidna.yaml
          fi

          docker pull trailofbits/echidna:latest

          for contract in contracts/*.sol; do
            [ -f "$contract" ] || continue
            contract_file="$(basename "$contract")"

            if grep -qE "pragma\s+solidity\s+\^?0\.4" "$contract"; then
              echo "========================================" | tee -a security-report.txt
              echo "Fuzz Testing: $contract_file (skipped: Solidity 0.4.x not supported by container)" | tee -a security-report.txt
              echo "========================================" | tee -a security-report.txt
              echo "" | tee -a security-report.txt
              continue
            fi

            echo "========================================" | tee -a security-report.txt
            echo "Fuzz Testing: $contract_file" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            docker run --rm \
              -v "$PWD":/src \
              -w /src \
              trailofbits/echidna:latest \
              echidna-test "contracts/$contract_file" \
                --test-mode assertion \
                --config echidna.yaml \
                --solc-args "--base-path . --include-path node_modules --ignore-pragma" \
              2>&1 | tee -a security-report.txt || true

            echo "" | tee -a security-report.txt
          done

      # ------------------------------
      # Mythril (auto solc; skip 0.4.x issues)
      # ------------------------------
      - name: Install Mythril + solc-select
        run: |
          python3 -m pip install --upgrade pip
          pip install mythril solc-select

      - name: Run Mythril analysis (auto-detect solc version + include paths)
        run: |
          echo "=== MYTHRIL SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Mythril" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo "" | tee -a security-report.txt

          pick_version() {
            raw="$1"
            v="${raw//^/}"; v="${v//>=/}"; v="${v//~=/}"; v="${v// /}"
            if echo "$v" | grep -q "^0\.4"; then echo "0.4.26"; return; fi
            case "$v" in
              0.8.30|0.8.29|0.8.28|0.8.27|0.8.26|0.8.25|0.8.24|0.8.23|0.8.22|0.8.21|0.8.20) echo "$v" ;;
              0.8.*) echo "0.8.26" ;;
              *) echo "0.8.20" ;;
            esac
          }

          need_versions="$(grep -hRoE "pragma solidity[^;]*;" contracts | sed -E 's/.*solidity([^;]*);/\1/' | tr -d ' ' | sort -u)"
          base_versions="0.4.26 0.8.20 0.8.22 0.8.25 0.8.26 0.8.28 0.8.29 0.8.30"
          for tok in $need_versions $base_versions; do
            v=$(pick_version "$tok")
            solc-select versions | grep -q " $v " || solc-select install "$v" || true
          done

          for contract in contracts/*.sol; do
            [ -f "$contract" ] || continue
            name=$(basename "$contract")
            pragma_line=$(grep -m1 -E "pragma solidity" "$contract" || true)
            version_token=$(echo "$pragma_line" | sed -E 's/.*solidity([^;]*);/\1/' | awk '{print $1}' | tr -d ' ')
            solv=$(pick_version "$version_token")

            echo "========================================" | tee -a security-report.txt
            echo "Analyzing: $name (solc $solv)" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            if echo "$solv" | grep -q "^0\.4"; then
              myth analyze "$contract" \
                --solv "$solv" \
                --solc-args "--allow-paths .,node_modules -I node_modules" \
                --execution-timeout 120 \
                --max-depth 16 \
                --create-timeout 60 \
                --solver-timeout 10000 \
                2>&1 | tee -a security-report.txt || true
            else
              myth analyze "$contract" \
                --solv "$solv" \
                --solc-args "--base-path . --include-path node_modules --allow-paths .,node_modules" \
                --execution-timeout 120 \
                --max-depth 16 \
                --create-timeout 60 \
                --solver-timeout 10000 \
                2>&1 | tee -a security-report.txt || true
            fi

            echo "" | tee -a security-report.txt
          done

      - name: Upload full security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Discover contracts for deployment
        run: |
          echo "=== CONTRACTS DISCOVERED FOR DEPLOYMENT ==="
          ls -la contracts/
          echo ""
          ls contracts/*.sol | sed 's/contracts\//  - /'
          echo ""
          echo "Total contracts to deploy: $(ls contracts/*.sol | wc -l)"

      - name: Deploy to Sepolia Testnet
        env:
          INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: npx hardhat run scripts/deploy-all.js --network sepolia

      - name: Display deployment summary
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          if [ -f deployment-summary.txt ]; then
            cat deployment-summary.txt
          else
            echo "No deployment summary found"
          fi

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.txt
