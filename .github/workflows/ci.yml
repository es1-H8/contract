      #     echo "----------------------------------------" | tee -a security-report.txt
      #     echo "Slither Analysis Results" | tee -a security-report.txt
      #     echo "----------------------------------------" | tee -a security-report.txt
      #     ls contracts/*.sol 2>/dev/null | sed 's#contracts/#  - #' | tee -a security-report.txt
      #     echo "" | tee -a security-report.txt

      # ==============================
      # Echidna (multi-solc via toolbox)
      # ==============================
      - name: Prepare Echidna config
        run: |
          [ -f echidna.yaml ] || printf "testLimit: 100\nseqLen: 50\n" > echidna.yaml
          echo "Created/verified echidna.yaml:"
          cat echidna.yaml

      - name: Run Echidna analysis (solc-select per file)
        run: |
          echo "=== ECHIDNA SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Echidna (trailofbits/eth-security-toolbox)" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo "" | tee -a security-report.txt

          docker pull trailofbits/eth-security-toolbox:latest

          pick_version() {
            raw="$1"
            v="${raw//^/}"; v="${v//>=/}"; v="${v//~=/}"; v="${v// /}"
            case "$v" in
              0.4.*) echo "0.4.26" ;;
              0.5.*) echo "0.5.17" ;;
              0.6.*) echo "0.6.12" ;;
              0.7.*) echo "0.7.6"  ;;
              0.8.[0-9][0-9]|0.8.[0-9]) echo "$v" ;;  # exact 0.8.x
              0.8.*) echo "0.8.26" ;;                 # default for generic 0.8.*
              *) echo "0.8.26" ;;
            esac
          }

          shopt -s nullglob
          for contract in contracts/*.sol; do
            file="$(basename "$contract")"
            pragma=$(grep -m1 -E "pragma\s+solidity" "$contract" || true)
            token=$(echo "$pragma" | sed -E 's/.*solidity([^;]*);/\1/' | awk '{print $1}' | tr -d ' ')
            SOLV=$(pick_version "$token")

            # Only fuzz 0.8.x here to keep parity with your earlier guard
            if ! echo "$pragma" | grep -qE "0\.8"; then
              echo "========================================" | tee -a security-report.txt
              echo "Fuzz Testing: $file (skipped: Echidna run limited to 0.8.x)" | tee -a security-report.txt
              echo "========================================" | tee -a security-report.txt
              echo "" | tee -a security-report.txt
              continue
            fi

            echo "========================================" | tee -a security-report.txt
            echo "Fuzz Testing: $file (solc $SOLV)" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            docker run --rm \
              -v "$PWD":/src \
              -w /src \
              trailofbits/eth-security-toolbox:latest \
              bash -lc "
                solc-select install $SOLV || true
                solc-select use $SOLV
                echidna-test 'contracts/$file' \
                  --test-mode assertion \
                  --config echidna.yaml \
                  --solc-args '--base-path /src --include-path /src/node_modules --allow-paths /src,/src/node_modules'
              " 2>&1 | tee -a security-report.txt || true

            echo "" | tee -a security-report.txt
          done

      # ==============================
      # Mythril (multi-solc; imports resolved)
      # ==============================
      - name: Install Mythril + solc-select
        run: |
          python3 -m pip install --upgrade pip
          pip install mythril solc-select

      - name: Run Mythril analysis
        run: |
          set -e
          echo "=== MYTHRIL SECURITY ANALYSIS ===" | tee -a security-report.txt
          echo "Tool: Mythril" | tee -a security-report.txt
          echo "Timestamp: $(date)" | tee -a security-report.txt
          echo ""

          ABS="$(pwd)"
          echo "cwd: $ABS"
          echo "contracts present:"; ls -la "$ABS/contracts" || true
          echo ""

          pick_version() {
            raw="$1"
            v="${raw//^/}"; v="${v//>=/}"; v="${v//~=/}"; v="${v// /}"
            case "$v" in
              0.4.*) echo "0.4.26" ;;
              0.5.*) echo "0.5.17" ;;
              0.6.*) echo "0.6.12" ;;
              0.7.*) echo "0.7.6"  ;;
              0.8.30|0.8.29|0.8.28|0.8.27|0.8.26|0.8.25|0.8.24|0.8.23|0.8.22|0.8.21|0.8.20) echo "$v" ;;
              0.8.*) echo "0.8.26" ;;
              *) echo "0.8.20" ;;
            esac
          }

          for v in 0.4.26 0.5.17 0.6.12 0.7.6 0.8.20 0.8.26 0.8.30; do
            solc-select versions | grep -q " $v " || solc-select install "$v" || true
          done

          shopt -s nullglob
          for contract in contracts/*.sol; do
            name=$(basename "$contract")
            pragma=$(grep -m1 -E "pragma\s+solidity" "$contract" || true)
            token=$(echo "$pragma" | sed -E 's/.*solidity([^;]*);/\1/' | awk '{print $1}' | tr -d ' ')
            solv=$(pick_version "$token")

            if echo "$solv" | grep -q "^0\.4"; then
              echo "========================================" | tee -a security-report.txt
              echo "Analyzing: $name (skipped: Can't compile and I use Mythril on old contracts.)" | tee -a security-report.txt
              echo "========================================" | tee -a security-report.txt
              echo "" | tee -a security-report.txt
              continue
            fi

            echo "========================================" | tee -a security-report.txt
            echo "Analyzing: $name (solc $solv)" | tee -a security-report.txt
            echo "========================================" | tee -a security-report.txt

            if echo "$solv" | grep -Eq "^0\.(5|6)\."; then
              myth analyze "contracts/$name" \
                --solv "$solv" \
                --solc-args "--allow-paths $ABS,$ABS/node_modules" \
                --execution-timeout 120 \
                --max-depth 16 \
                --create-timeout 60 \
                --solver-timeout 10000 \
                2>&1 | tee -a security-report.txt || true
            else
              myth analyze "contracts/$name" \
                --solv "$solv" \
                --solc-args "--base-path $ABS --include-path $ABS/node_modules --allow-paths $ABS,$ABS/node_modules" \
                --execution-timeout 120 \
                --max-depth 16 \
                --create-timeout 60 \
                --solver-timeout 10000 \
                2>&1 | tee -a security-report.txt || true
            fi

            echo "" | tee -a security-report.txt
          done

      - name: Upload full security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt

  deploy:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Discover contracts for deployment
        run: |
          echo "=== CONTRACTS DISCOVERED FOR DEPLOYMENT ==="
          ls -la contracts/ || true
          echo ""
          ls contracts/*.sol 2>/dev/null | sed 's#contracts/#  - #'
          echo ""
          echo "Total contracts to deploy: $(ls contracts/*.sol 2>/dev/null | wc -l | xargs)"

      - name: Deploy to Sepolia Testnet
        env:
          INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: npx hardhat run scripts/deploy-all.js --network sepolia

      - name: Display deployment summary
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          if [ -f deployment-summary.txt ]; then
            cat deployment-summary.txt
          else
            echo "No deployment summary found"
          fi

      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.txt
